services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: multifactor
      POSTGRES_PASSWORD: multifactor
      POSTGRES_DB: multifactor
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      MFP_DATABASE_URL: postgresql+psycopg://multifactor:multifactor@postgres:5432/multifactor
    ports:
      - "8000:8000"
    depends_on:
      - postgres

volumes:
  postgres-data:
